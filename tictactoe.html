<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    background: #1a1a2e;
    color: #eee;
  }
  .container { text-align: center; }
  h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: #e94560; }
  .status {
    font-size: 1.3rem; margin-bottom: 1rem; min-height: 2rem;
    color: #eee;
  }
  .board {
    display: grid; grid-template-columns: repeat(3, 120px);
    grid-template-rows: repeat(3, 120px);
    gap: 6px; margin: 0 auto; width: fit-content;
  }
  .cell {
    background: #16213e; border: none; border-radius: 8px;
    font-size: 3rem; font-weight: bold; color: #eee;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
  }
  .cell:hover:not(.taken) { background: #1a1a40; transform: scale(1.05); }
  .cell.x { color: #e94560; }
  .cell.o { color: #0f3460; }
  .cell.win { background: #e9456033; animation: pulse 0.6s ease-in-out infinite alternate; }
  @keyframes pulse { to { background: #e9456066; } }
  .restart {
    margin-top: 1.5rem; padding: 12px 32px;
    font-size: 1.1rem; border: none; border-radius: 8px;
    background: #e94560; color: #fff; cursor: pointer;
    transition: background 0.2s;
  }
  .restart:hover { background: #c81e45; }
  .score {
    display: flex; justify-content: center; gap: 2rem;
    margin-bottom: 1rem; font-size: 1.1rem;
  }
  .score span { padding: 4px 16px; border-radius: 6px; background: #16213e; }
</style>
</head>
<body>
<div class="container">
  <h1>Tic Tac Toe</h1>
  <div class="score">
    <span>X: <strong id="scoreX">0</strong></span>
    <span>O: <strong id="scoreO">0</strong></span>
    <span>Draw: <strong id="scoreD">0</strong></span>
  </div>
  <div class="status" id="status">X's turn</div>
  <div class="board" id="board"></div>
  <button class="restart" onclick="init()">New Game</button>
</div>
<script>
const wins = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];
let board, turn, over, scores = {X:0, O:0, D:0};

function init() {
  board = Array(9).fill('');
  turn = 'X'; over = false;
  document.getElementById('status').textContent = "X's turn";
  const el = document.getElementById('board');
  while (el.firstChild) el.removeChild(el.firstChild);
  for (let i = 0; i < 9; i++) {
    const btn = document.createElement('button');
    btn.className = 'cell';
    btn.dataset.i = i;
    btn.addEventListener('click', play);
    el.appendChild(btn);
  }
}

function play(e) {
  const i = +e.target.dataset.i;
  if (over || board[i]) return;
  board[i] = turn;
  const cell = e.target;
  cell.textContent = turn;
  cell.classList.add('taken', turn.toLowerCase());

  const winLine = wins.find(w => w.every(j => board[j] === turn));
  if (winLine) {
    over = true;
    document.getElementById('status').textContent = turn + ' wins!';
    scores[turn]++;
    updateScores();
    winLine.forEach(j => document.querySelectorAll('.cell')[j].classList.add('win'));
    return;
  }
  if (board.every(c => c)) {
    over = true;
    document.getElementById('status').textContent = "It's a draw!";
    scores.D++;
    updateScores();
    return;
  }
  turn = turn === 'X' ? 'O' : 'X';
  document.getElementById('status').textContent = turn + "'s turn";
}

function updateScores() {
  document.getElementById('scoreX').textContent = scores.X;
  document.getElementById('scoreO').textContent = scores.O;
  document.getElementById('scoreD').textContent = scores.D;
}

init();
</script>
</body>
</html>
